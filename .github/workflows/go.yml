name: Build and Test
on: [push, pull_request]
permissions:
  contents: read
jobs:
  build:
    name: Go CI
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v5
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.24.9
          cache: true
      # - name: Run golangci-lint
      #   uses: golangci/golangci-lint-action@v7
      #   with:
      #     version: v2.6.1
      #     args: --timeout 5m
      - name: Build And Vet
        run: |
          go vet ./...
          go build -v ./...
      - name: Test
        run: |
          env GORACE="halt_on_error=1" go test -count 1 -timeout 120s -race -cover ./...
