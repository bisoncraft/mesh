syntax = "proto3";

package pb;

option go_package = "github.com/bisoncraft/mesh/tatanka/pb";

// ClientConnectionMsg is used internally by tatanka nodes to share client connection information.
message ClientConnectionMsg {
  bytes id = 1;           // peer.ID serialized as bytes
  bytes reporter_id = 2;  // peer.ID serialized as bytes
  bool connected = 3;
  int64 timestamp = 4;
}

message TatankaForwardRelayRequest {
  bytes initiator_id = 1; // peer.ID serialized as bytes
  bytes counterparty_id = 2; // peer.ID serialized as bytes
  bytes message = 3;
}

message TatankaForwardRelayResponse {
  oneof response {
    bytes success = 1;
    ClientNotFound client_not_found = 2;
    string error = 4;
  }

  message ClientNotFound {
  }
}

message DiscoveryRequest {
  bytes id = 1;
}

message DiscoveryResponse {
  oneof response {
    Success success = 1;
    NotFound not_found = 2;
  }

  message Success {
    repeated bytes addrs = 1;
  }

  message NotFound {}
}

// WhitelistState is used both for the symmetric whitelist handshake between
// tatanka nodes and for gossipsub whitelist proposal broadcasts.
message WhitelistState {
  repeated bytes peerIDs = 1;
  repeated bytes proposed_peerIDs = 2;   // empty = no proposal
  int64 timestamp = 3;
  bool ready = 4;                        // true = node is ready to switch
}


// NodeOracleUpdate contains oracle data for sharing between Tatanka mesh nodes.
message NodeOracleUpdate {
  string source = 1;
  int64 timestamp = 2;
  map<string, double> prices = 3;     // ticker -> price
  map<string, bytes> fee_rates = 4;   // network -> big-endian encoded big.Int
  QuotaStatus quota = 5;
}

// QuotaStatus represents quota state for an API source.
message QuotaStatus {
  int64 fetches_remaining = 1;
  int64 fetches_limit = 2;
  int64 reset_timestamp = 3;     // Unix timestamp
}

// QuotaHandshake is exchanged between nodes on connection and periodically
// via heartbeat to share quota information for network-coordinated scheduling.
message QuotaHandshake {
  map<string, QuotaStatus> quotas = 1; // source -> quota
}
