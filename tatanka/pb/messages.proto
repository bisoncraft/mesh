syntax = "proto3";

package pb;

option go_package = "github.com/bisoncraft/mesh/tatanka/pb";

// ClientConnectionMsg is used internally by tatanka nodes to share client connection information.
message ClientConnectionMsg {
  bytes id = 1;           // peer.ID serialized as bytes
  bytes reporter_id = 2;  // peer.ID serialized as bytes
  bool connected = 3;
  int64 timestamp = 4;
}

// ClientBanMsg is used internally by tatanka nodes to share client ban information.
message ClientBanMsg {
  string ip = 1;           // banned client IP address
  bytes reporter = 2;      // peer.ID of reporting node
  uint32 total_penalties = 3;
  int64 expiry = 4;
}

// ClientInfractionMsg is used to gossip individual client infractions between tatanka nodes.
message ClientInfractionMsg {
  string ip = 1;                 // client IP address
  bytes reporter = 2;            // peer.ID of reporting node
  uint32 infraction_type = 3;    // infractionType enum value
  uint32 penalty = 4;            // penalty for this infraction
  int64 expiry = 5;              // when this infraction expires
}

message TatankaForwardRelayRequest {
  bytes initiator_id = 1; // peer.ID serialized as bytes
  bytes counterparty_id = 2; // peer.ID serialized as bytes
  bytes message = 3;
}

message TatankaForwardRelayResponse {
  oneof response {
    bytes success = 1;
    ClientNotFound client_not_found = 2;
    ClientRejected client_rejected = 3;
    string error = 4;
  }

  message ClientNotFound {
  }

  message ClientRejected {
  }
}

message DiscoveryRequest {
  bytes id = 1;
}

message DiscoveryResponse {
  oneof response {
    Success success = 1;
    NotFound not_found = 2;
  }

  message Success {
    repeated bytes addrs = 1;
  }

  message NotFound {}
}

message WhitelistRequest {
  repeated bytes peerIDs = 1;
}

message WhitelistResponse {
  oneof response {
    Success success = 1;
    Mismatch mismatch = 2;
  }

  message Success {
  }

  message Mismatch {
    repeated bytes peerIDs = 1;
  }
}

// SourcedPrice represents a single price entry within a sourced update batch.
message SourcedPrice {
  string ticker = 1;
  double price = 2;
}

// SourcedPriceUpdate is a batch of price updates from a single source for sharing
// between Tatanka Mesh nodes.
message SourcedPriceUpdate {
  string source = 1;
  int64 timestamp = 2;
  repeated SourcedPrice prices = 3;
}

// SourcedFeeRate represents a single fee rate entry within a sourced update batch.
message SourcedFeeRate {
  string network = 1;
  bytes fee_rate = 2;  // big-endian encoded big integer
}

// SourcedFeeRateUpdate is a batch of fee rate updates from a single source for sharing
// between Tatanka Mesh nodes.
message SourcedFeeRateUpdate {
  string source = 1;
  int64 timestamp = 2;
  repeated SourcedFeeRate fee_rates = 3;
}

// NodeOracleUpdate contains oracle data for sharing between Tatanka mesh nodes.
message NodeOracleUpdate {
  oneof update {
    SourcedPriceUpdate price_update = 1;
    SourcedFeeRateUpdate fee_rate_update = 2;
  }
}

// ClientInfractionsSnapshotRequest is sent by a tatanka node to query another node for its active client infractions.
message ClientInfractionsSnapshotRequest {}

// ClientInfractionsSnapshotResponse contains the snapshot of active client infractions.
message ClientInfractionsSnapshotResponse {
  repeated ClientInfractionMsg infractions = 1;
}
