syntax = "proto3";

package pb;

option go_package = "github.com/martonp/tatanka-mesh/protocols/pb";

message Response {
  oneof response {
    Success success = 1;
    Error error = 2;
    SubscriptionsResponse subscriptions_response = 3;
    ClientAddrResponse addr_response = 4;
    PostBondResponse post_bond_response = 5;
    AvailableMeshNodesResponse available_mesh_nodes_response = 6;
  }
}

message Success {
  // Intentionally empty generic success response
}

// UnauthorizedError is returned when making a request on a protocol for which
// the peer is not authorized.
message UnauthorizedError {
}

// CounterpartyNotFoundError is returned during a client initiate relay request
// to indicate that the relay was unable to be setup because the counterparty
// was not found.
message CounterpartyNotFoundError {
}

// CounterpartyRejectedError is returned during a client initiate relay request
// to indicate that the relay was unable to be setup because the counterparty
// rejected the relay request.
message CounterpartyRejectedError {
}

// PostBondError is a type containing specific error information for the
// PostBonds protocol.
message PostBondError {
  uint32 invalidBondIndex = 1;
}

message Error {
  oneof error {
    UnauthorizedError unauthorized = 1;
    PostBondError post_bond_error = 2;
    string message = 3;
    CounterpartyNotFoundError cp_not_found_error = 4;
    CounterpartyRejectedError cp_rejected_error = 5;
  }
}

// PublishRequest is sent by a client to publish a message to a topic.
message PublishRequest {
  string topic = 1;
  bytes data = 2;
}

// PushMessage is sent by the server to push a message to a subscribed client.
// Used with the PushProtocol.
message PushMessage {
  enum MessageType {
    UNSPECIFIED = 0;
    BROADCAST = 1;
    SUBSCRIBE = 2;
    UNSUBSCRIBE = 3;
  }

  MessageType message_type = 1;
  string topic = 2;
  bytes data = 3;    // Only populated for BROADCAST messages
  bytes sender = 4;  // The peer who sent the message or performed the subscription action
}

// SubscribeRequest is sent by a client to subscribe or unsubscribe from
// a topic.
message SubscribeRequest {
  string topic = 1;
  bool subscribe = 2;
}

// SubscriptionsResponse is sent by a tatanka node informing the client
// which topics they are subscribed to.
message SubscriptionsResponse {
  repeated string topics = 1;
}

// ClientAddrRequest is sent by a client to request the addresses of another peer.
message ClientAddrRequest {
  bytes id = 1; // peer.ID serialized as bytes
}

// ClientAddrResponse is the response containing the multiaddresses of a peer or an error.
// Used with the ClientAddr.
message ClientAddrResponse {
  repeated bytes addrs = 1;  // multiaddrs serialized as bytes
}

message Bond {
  uint32 assetID = 1;
  bytes bondID = 2;
}

message PostBondRequest {
  repeated Bond bonds = 1;
}


message PostBondResponse {
  uint32 bondStrength = 1;
}

// PeerInfo contains information about a single peer.
message PeerInfo {
  bytes id = 1;            // peer.ID serialized as bytes
  repeated bytes addrs = 2; // multiaddrs serialized as bytes
}

// ClientRelayMessageRequest is a client originating request to send a
// message to another client.
message ClientRelayMessageRequest {
  bytes peerID = 1; // peer.ID serialized as bytes
  bytes message = 2;
}

// ClientRelayMessageResponse is the response to a ClientRelayMessageRequest.
message ClientRelayMessageResponse {
  oneof response {
    bytes message = 1;
    Error error = 2;
  }
}

// TatankaRelayMessageRequest is a tatanka node originating request to a client
// to notify them that another client is sending them a message.
message TatankaRelayMessageRequest {
  bytes peerID = 1; // peer.ID serialized as bytes
  bytes message = 2;
}

// TatankaRelayMessageResponse is the response to a TatankaRelayMessageRequest.
message TatankaRelayMessageResponse {
  oneof response {
    bytes message = 1;
    Error error = 2;
  }
}

// AvailableMeshNodesRequest is sent by a client to get a list of all mesh
// nodes that the tatanka node is connected to.
message AvailableMeshNodesRequest {
  // Intentionally empty
}

// AvailableMeshNodesResponse contains a list of all whitelisted mesh nodes
// that this tatanka node is connected to, including itself.
message AvailableMeshNodesResponse {
  repeated PeerInfo peers = 1;
}

// InitialSubscriptions is sent by the client as the first message when
// establishing a push stream. It contains the list of topics the client
// is currently subscribed to.
message InitialSubscriptions {
  repeated string topics = 1;
}

// Price represents a single ticker-price pair for client consumption.
message ClientPriceUpdate {
  double price = 1;
}

// ClientFeeRateUpdate represents a network-fee rate update for client consumption.
message ClientFeeRateUpdate {
  bytes fee_rate = 1;  // big-endian encoded big integer
}

// ClientOracleUpdate contains oracle data for clients.
message ClientOracleUpdate {
  oneof update {
    ClientPriceUpdate price_update = 1;
    ClientFeeRateUpdate fee_rate_update = 2;
  }
}
